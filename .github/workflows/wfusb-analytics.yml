name: WFUSB Analytics Injector

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - 'wfusb-analytics-injector.js'
      - '.github/workflows/wfusb-analytics.yml'

permissions:
  contents: write

jobs:
  inject-analytics:
    if: ${{ !contains(github.event.head_commit.message, '[skip analytics]') }}
    runs-on: ubuntu-latest
    env:
      GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID || secrets.GA4_MEASUREMENT_ID }}
      CLARITY_PROJECT_ID: ${{ vars.CLARITY_PROJECT_ID || secrets.CLARITY_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject GA4 and Microsoft Clarity snippets
        run: node wfusb-analytics-injector.js

      - name: Commit analytics updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No analytics updates needed."
          else
            git commit -m "Add WFUSB analytics snippets [skip analytics]"
            git push
          fi
