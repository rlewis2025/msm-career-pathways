name: WFUSB Location Data Update

on:
  push:
    branches: [main]
    paths:
      - 'wfusb-location-update.js'
      - '.github/workflows/wfusb-location-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-location-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: node wfusb-location-update.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index.html changes needed."
          else
            git commit -m "Update top hiring locations data"
            git push
          fi
